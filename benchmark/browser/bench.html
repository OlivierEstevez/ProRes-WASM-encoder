<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProRes WASM benchmark — browser</title>
  <style>
    body { font: 14px/1.5 -apple-system, system-ui, sans-serif; margin: 2rem; max-width: 1000px; }
    h1 { font-size: 1.3rem; }
    button { font-size: 14px; padding: .4rem .9rem; margin-right: .5rem; cursor: pointer; }
    table { border-collapse: collapse; margin-top: 1rem; width: 100%; }
    th, td { border: 1px solid #ccc; padding: .3rem .6rem; text-align: right; }
    th:first-child, td:first-child, th:nth-child(3), td:nth-child(3) { text-align: left; }
    thead { background: #f2f2f2; }
    #log { white-space: pre-wrap; background: #111; color: #ddd; padding: 1rem; border-radius: 6px;
           margin-top: 1rem; font: 12px/1.45 ui-monospace, monospace; max-height: 340px; overflow: auto; }
  </style>
</head>
<body>
  <h1>ProRes WASM encoder — in-browser benchmark</h1>
  <p>Our library (single + worker pool) vs ffmpeg.wasm (single-thread &amp; multi-thread), same frames, same engine.</p>
  <button id="run">Run benchmark</button>
  <button id="csv">Download CSV</button>
  <table>
    <thead><tr><th>Encoder</th><th>Threads</th><th>Profile</th><th>fps</th><th>real-time</th><th>encode</th><th>MB</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="log"></div>
  <script type="module" src="/benchmark/browser/bench.js"></script>
</body>
</html>
