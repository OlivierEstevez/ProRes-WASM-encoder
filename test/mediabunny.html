<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProRes WASM Encoder × MediaBunny</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', sans-serif; background: #111; color: #eee; padding: 32px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    p.sub { color: #999; font-size: 13px; margin-bottom: 24px; }
    .row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
    canvas { background: #000; border: 1px solid #333; width: 480px; height: 270px; }
    .panel { flex: 1; min-width: 320px; }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 4px; }
    select, input { width: 100%; background: #1a1a1a; color: #eee; border: 1px solid #333; padding: 8px; font-family: inherit; font-size: 13px; }
    input[type="checkbox"] { width: auto; }
    button { background: #eee; color: #111; border: 0; padding: 10px 18px; font-family: inherit; font-weight: 600; font-size: 13px; cursor: pointer; margin-right: 8px; }
    button:disabled { opacity: 0.4; cursor: default; }
    #log { margin-top: 16px; background: #0a0a0a; border: 1px solid #222; padding: 12px; height: 220px; overflow-y: auto; font-family: 'Space Mono', monospace; font-size: 11px; line-height: 1.7; }
    .ok { color: #7fd47f; } .err { color: #e06c6c; } .info { color: #8ab4f8; }
  </style>
  <!-- Resolves the adapter's bare `import 'mediabunny'`. The CDN bundle is
       used so the demo works with any static server (most refuse to serve
       node_modules). In an app with a bundler, none of this is needed. -->
  <script type="importmap">
  {
    "imports": {
      "mediabunny": "https://cdn.jsdelivr.net/npm/mediabunny@1/dist/bundles/mediabunny.min.mjs"
    }
  }
  </script>
</head>
<body>
  <h1>ProRes WASM Encoder × MediaBunny</h1>
  <p class="sub">
    MediaBunny owns the pipeline and container; <code>prores-wasm-encoder</code> is registered
    as its ProRes encoder via <code>registerProResEncoder()</code>.
  </p>

  <div class="row">
    <canvas id="canvas" width="960" height="540"></canvas>
    <div class="panel">
      <div class="controls">
        <div>
          <label>Profile (fourcc)</label>
          <select id="fourcc">
            <option value="apco">ProRes 422 Proxy (apco)</option>
            <option value="apcs">ProRes 422 LT (apcs)</option>
            <option value="apcn">ProRes 422 (apcn)</option>
            <option value="apch" selected>ProRes 422 HQ (apch)</option>
            <option value="ap4h">ProRes 4444 (ap4h)</option>
            <option value="ap4x">ProRes 4444 XQ (ap4x)</option>
          </select>
        </div>
        <div>
          <label>Frames</label>
          <input type="number" id="frames" value="90" min="1" max="1000">
        </div>
        <div>
          <label>Multi-threaded</label>
          <input type="checkbox" id="mt" checked>
        </div>
        <div>
          <label>Workers</label>
          <input type="number" id="workers" value="4" min="1" max="16">
        </div>
      </div>
      <button id="startBtn">Record via MediaBunny</button>
      <button id="downloadBtn" disabled>Download .mov</button>
      <div id="log"></div>
    </div>
  </div>

  <script type="module">
    import { Output, BufferTarget, MovOutputFormat, CanvasSource } from 'mediabunny';
    import { registerProResEncoder } from '../dist/prores-encoder-mediabunny.esm.js';

    const logEl = document.getElementById('log');
    const log = (msg, cls = '') => {
      const d = document.createElement('div');
      d.className = cls;
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // A simple generative sketch (stand-in for your creative coding piece)
    function drawFrame(f, total) {
      const t = f / total;
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 60; i++) {
        const a = t * Math.PI * 2 + i * 0.35;
        const r = 60 + 180 * Math.sin(t * Math.PI * 2 * 2 + i * 0.13);
        const x = W / 2 + Math.cos(a) * r * 1.6;
        const y = H / 2 + Math.sin(a * 1.3) * r * 0.8;
        ctx.beginPath();
        ctx.arc(x, y, 14 + 10 * Math.sin(a * 3), 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${(t * 360 + i * 6) % 360} 80% 60% / 0.75)`;
        ctx.fill();
      }
    }
    drawFrame(0, 90);

    let movBlob = null;
    const startBtn = document.getElementById('startBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    startBtn.addEventListener('click', async () => {
      try {
        startBtn.disabled = true;
        downloadBtn.disabled = true;
        const fourcc = document.getElementById('fourcc').value;
        const total = parseInt(document.getElementById('frames').value) || 90;
        const mt = document.getElementById('mt').checked;
        const workers = parseInt(document.getElementById('workers').value) || 4;
        const fps = 30;

        // Register our encoder with MediaBunny (idempotent).
        registerProResEncoder({ workers: mt ? workers : 0 });
        log(`Encoder registered (${mt ? workers + ' workers' : 'single-thread'})`, 'info');

        const output = new Output({
          format: new MovOutputFormat(),
          target: new BufferTarget(),
        });
        const source = new CanvasSource(canvas, {
          codec: 'prores',
          fullCodecString: fourcc,
          bitrate: 100_000_000,
        });
        output.addVideoTrack(source, { frameRate: fps });
        await output.start();
        log(`Recording ${total} frames of ${W}x${H} as ${fourcc}...`, 'info');

        const t0 = performance.now();
        for (let f = 0; f < total; f++) {
          drawFrame(f, total);
          await source.add(f / fps, 1 / fps);
        }
        await output.finalize();
        const ms = performance.now() - t0;

        const buf = output.target.buffer;
        movBlob = new Blob([buf], { type: 'video/quicktime' });
        log(`Done: ${(buf.byteLength / 1e6).toFixed(1)} MB in ${(ms / 1000).toFixed(2)} s ` +
            `(${(ms / total).toFixed(1)} ms/frame, ${(1000 * total / ms).toFixed(1)} fps)`, 'ok');
        downloadBtn.disabled = false;
      } catch (err) {
        log(String(err && err.stack || err), 'err');
      } finally {
        startBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener('click', () => {
      const url = URL.createObjectURL(movBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mediabunny-prores.mov';
      a.click();
      URL.revokeObjectURL(url);
    });

    log('Ready. MediaBunny + prores-wasm-encoder loaded.', 'info');
  </script>
</body>
</html>
