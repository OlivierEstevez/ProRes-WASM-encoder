<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProRes WASM Encoder Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #f2f2f2;
      height: 100vh;
      overflow: hidden;
    }
    h1 {
      color: #f2f2f2;
      margin: 0 0 6px 0;
      font-size: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .subtitle {
      color: #a6a6a6;
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header {
      position: fixed;
      top: 16px;
      right: 16px;
      text-align: right;
      z-index: 5;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .control-group {
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      padding: 10px 12px;
      border-radius: 6px;
    }
    .control-group label {
      display: block;
      margin-bottom: 6px;
      color: #9a9a9a;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .control-group select,
    .control-group input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      background: #0a0a0a;
      color: #f2f2f2;
      font-size: 12px;
    }
    .canvas-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding-bottom: 120px;
    }
    .canvas-wrapper {
      width: min(1100px, 92vw);
      height: min(70vh, 720px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .canvas-wrapper h3 {
      margin: 0;
      color: #8a8a8a;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    canvas {
      width: 100%;
      background: #000;
      border-radius: 10px;
      border: 1px solid #222;
    }
    #previewContainer {
      width: auto;
      max-width: 100%;
      max-height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #previewContainer canvas {
      background-image:
        linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
        linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
        linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-color: #2a2a2a;
    }
    .buttons {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      padding: 10px 18px;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
      background: #0f0f0f;
      color: #f2f2f2;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary,
    .btn-success {
      background: #f2f2f2;
      color: #0a0a0a;
      border-color: #f2f2f2;
    }
    .btn-primary:hover:not(:disabled),
    .btn-success:hover:not(:disabled) {
      background: #dcdcdc;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #1a1a1a;
    }
    .status {
      background: transparent;
      padding: 0;
    }
    .status-label {
      font-size: 10px;
      color: #9a9a9a;
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 0.08em;
    }
    .status-value {
      font-size: 14px;
      font-weight: 600;
    }
    .status-value.encoding {
      color: #f2f2f2;
    }
    .status-value.ready {
      color: #f2f2f2;
    }
    .status-value.idle {
      color: #8a8a8a;
    }
    .progress {
      height: 2px;
      background: #1a1a1a;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #f2f2f2;
      width: 0%;
      transition: width 0.1s;
    }
    .log {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 280px;
      max-height: 200px;
      background: rgba(10, 10, 10, 0.9);
      border: 1px solid #1f1f1f;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      overflow-y: auto;
      z-index: 6;
    }
    .log-entry {
      margin-bottom: 5px;
      color: #b3b3b3;
    }
    .log-entry.info {
      color: #e0e0e0;
    }
    .log-entry.success {
      color: #f2f2f2;
    }
    .log-entry.error {
      color: #ffffff;
    }
    .settings-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0a0a0a;
      border-top: 1px solid #1f1f1f;
      padding: 14px 20px 18px;
      z-index: 4;
    }
    .settings-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .actions {
      display: grid;
      gap: 10px;
      justify-items: end;
    }
    @media (max-width: 900px) {
      .settings-row {
        grid-template-columns: 1fr;
      }
      .actions {
        justify-items: start;
      }
      .canvas-container {
        padding-bottom: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ProRes WASM</h1>
    <p class="subtitle">Canvas Capture Encoder</p>
  </div>

  <div class="canvas-container">
    <div class="canvas-wrapper">
      <h3>Preview</h3>
      <div id="previewContainer"></div>
    </div>
  </div>

  <div class="log" id="log"></div>

  <div class="settings-bar">
    <div class="settings-row">
      <div class="controls">
        <div class="control-group">
          <label>Resolution</label>
          <select id="resolution">
            <option value="640x480">640 x 480 (SD)</option>
            <option value="1280x720" selected>1280 x 720 (HD)</option>
            <option value="1920x1080">1920 x 1080 (Full HD)</option>
          </select>
        </div>
        <div class="control-group">
          <label>Frame Rate</label>
          <select id="framerate">
            <option value="24000/1001">23.976 fps</option>
            <option value="24/1">24 fps</option>
            <option value="25/1">25 fps</option>
            <option value="30000/1001">29.97 fps</option>
            <option value="30/1" selected>30 fps</option>
            <option value="60/1">60 fps</option>
          </select>
        </div>
        <div class="control-group">
          <label>ProRes Profile</label>
          <select id="profile">
            <option value="0">ProRes 422 Proxy</option>
            <option value="1">ProRes 422 LT</option>
            <option value="2">ProRes 422</option>
            <option value="3" selected>ProRes 422 HQ</option>
            <option value="4">ProRes 4444</option>
            <option value="5">ProRes 4444 XQ</option>
          </select>
        </div>
        <div class="control-group">
          <label>Duration (frames)</label>
          <input type="number" id="frames" value="90" min="1" max="1000">
        </div>
        <div class="control-group">
          <label>Color Range</label>
          <select id="range">
            <option value="full">Full</option>
            <option value="limited" selected>Video (Limited)</option>
          </select>
        </div>
        <div class="control-group">
          <label>PNG Sequence</label>
          <input type="checkbox" id="pngSequence">
        </div>
        <div class="control-group">
          <label>Parallel (workers)</label>
          <input type="checkbox" id="parallel">
        </div>
        <div class="control-group">
          <label>Worker Count</label>
          <input type="number" id="workerCount" value="4" min="1" max="16">
        </div>
      </div>
      <div class="actions">
        <div class="buttons">
          <input type="file" id="pngFolderInput" webkitdirectory multiple accept="image/png" style="display: none;">
          <button id="uploadPngBtn" class="btn-secondary">Upload PNG Folder</button>
          <button id="startBtn" class="btn-primary">Record</button>
          <button id="stopBtn" class="btn-secondary" disabled>Stop</button>
          <button id="downloadBtn" class="btn-success" disabled>Download</button>
          <button id="downloadPngBtn" class="btn-secondary" disabled>Download PNG Zip</button>
        </div>
        <div class="status">
          <div class="status-label">Status</div>
          <div class="status-value idle" id="statusText">Ready</div>
          <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script type="module">
    let createProResEncoder = null;
    let createProResEncoderPool = null;
    let moduleLoadError = null;

    const log = (msg, type = '') => {
      const logEl = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    };

    const setStatus = (text, className) => {
      const statusEl = document.getElementById('statusText');
      statusEl.textContent = text;
      statusEl.className = `status-value ${className}`;
    };

    const setProgress = (percent) => {
      document.getElementById('progressBar').style.width = `${percent}%`;
    };

    // Load encoder module relative to this file.
    (async () => {
      try {
        const moduleUrl = new URL('../dist/prores-encoder.esm.js', import.meta.url);
        const mod = await import(moduleUrl.href);
        createProResEncoder = mod.default;
        // Parallel encoding lives in its own entry point so the base
        // library stays small; the browser shares the common chunk.
        const parallelUrl = new URL('../dist/prores-encoder-parallel.esm.js', import.meta.url);
        const parallelMod = await import(parallelUrl.href);
        createProResEncoderPool = parallelMod.createProResEncoderPool;
        log('Encoder module loaded', 'info');
      } catch (err) {
        moduleLoadError = err;
        log('Failed to load encoder module. Serve the repo root so ../dist is accessible.', 'error');
      }
    })();

    const textEncoder = new TextEncoder();
    const crcTable = (() => {
      const table = new Uint32Array(256);
      for (let i = 0; i < 256; i++) {
        let c = i;
        for (let k = 0; k < 8; k++) {
          c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        }
        table[i] = c >>> 0;
      }
      return table;
    })();

    const crc32 = (data) => {
      let crc = 0xFFFFFFFF;
      for (let i = 0; i < data.length; i++) {
        crc = crcTable[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
      }
      return (crc ^ 0xFFFFFFFF) >>> 0;
    };

    const buildZip = (files) => {
      const parts = [];
      const centralParts = [];
      let offset = 0;

      for (const file of files) {
        const nameBytes = textEncoder.encode(file.name);
        const data = file.data;
        const crc = crc32(data);

        const localHeader = new Uint8Array(30 + nameBytes.length);
        const view = new DataView(localHeader.buffer);
        view.setUint32(0, 0x04034b50, true);
        view.setUint16(4, 20, true);
        view.setUint16(6, 0, true);
        view.setUint16(8, 0, true);
        view.setUint16(10, 0, true);
        view.setUint16(12, 0, true);
        view.setUint32(14, crc, true);
        view.setUint32(18, data.length, true);
        view.setUint32(22, data.length, true);
        view.setUint16(26, nameBytes.length, true);
        view.setUint16(28, 0, true);
        localHeader.set(nameBytes, 30);

        parts.push(localHeader, data);

        const centralHeader = new Uint8Array(46 + nameBytes.length);
        const cview = new DataView(centralHeader.buffer);
        cview.setUint32(0, 0x02014b50, true);
        cview.setUint16(4, 20, true);
        cview.setUint16(6, 20, true);
        cview.setUint16(8, 0, true);
        cview.setUint16(10, 0, true);
        cview.setUint16(12, 0, true);
        cview.setUint16(14, 0, true);
        cview.setUint32(16, crc, true);
        cview.setUint32(20, data.length, true);
        cview.setUint32(24, data.length, true);
        cview.setUint16(28, nameBytes.length, true);
        cview.setUint16(30, 0, true);
        cview.setUint16(32, 0, true);
        cview.setUint16(34, 0, true);
        cview.setUint16(36, 0, true);
        cview.setUint32(38, 0, true);
        cview.setUint32(42, offset, true);
        centralHeader.set(nameBytes, 46);

        centralParts.push(centralHeader);
        offset += localHeader.length + data.length;
      }

      const centralOffset = offset;
      let centralSize = 0;
      for (const part of centralParts) {
        centralSize += part.length;
      }

      parts.push(...centralParts);

      const endRecord = new Uint8Array(22);
      const endView = new DataView(endRecord.buffer);
      endView.setUint32(0, 0x06054b50, true);
      endView.setUint16(4, 0, true);
      endView.setUint16(6, 0, true);
      endView.setUint16(8, files.length, true);
      endView.setUint16(10, files.length, true);
      endView.setUint32(12, centralSize, true);
      endView.setUint32(16, centralOffset, true);
      endView.setUint16(20, 0, true);
      parts.push(endRecord);

      let totalSize = 0;
      for (const part of parts) {
        totalSize += part.length;
      }
      const out = new Uint8Array(totalSize);
      let cursor = 0;
      for (const part of parts) {
        out.set(part, cursor);
        cursor += part.length;
      }
      return out;
    };

    const canvasToPngBlob = (canvas) => new Promise((resolve, reject) => {
      canvas.toBlob((blob) => {
        if (!blob) {
          reject(new Error('Failed to capture PNG'));
          return;
        }
        resolve(blob);
      }, 'image/png');
    });

    // p5.js sketch for demo content
    let p5Instance = null;
    let currentFrame = 0;
    let currentTotalFrames = 1;
    let renderWidth = 640;
    let renderHeight = 360;

    const initP5 = (width, height) => {
      renderWidth = width;
      renderHeight = height;
      const sketch = (p) => {
        p.setup = () => {
          p.createCanvas(width, height).parent('previewContainer');
          p.pixelDensity(1);
          p.noLoop();
        };

        p.draw = () => {
          const t = currentTotalFrames > 0 ? currentFrame / currentTotalFrames : 0;
          p.colorMode(p.HSL, 360, 100, 100, 1);
          const grad = p.drawingContext.createLinearGradient(0, 0, p.width, p.height);
          grad.addColorStop(0, `hsl(${(t * 360) % 360}, 70%, 20%)`);
          grad.addColorStop(1, `hsl(${(t * 360 + 180) % 360}, 70%, 10%)`);
          p.drawingContext.fillStyle = grad;
          p.drawingContext.fillRect(0, 0, p.width, p.height);

          for (let i = 0; i < 10; i++) {
            const angle = t * Math.PI * 2 + (i / 10) * Math.PI * 2;
            const radius = Math.min(p.width, p.height) * 0.35;
            const x = p.width / 2 + Math.cos(angle) * radius * 0.6;
            const y = p.height / 2 + Math.sin(angle) * radius * 0.6;
            const size = 24 + Math.sin(t * Math.PI * 4 + i) * 18;
            p.noStroke();
            p.fill((t * 360 + i * 36) % 360, 80, 60);
            p.circle(x, y, size);
          }

          p.push();
          p.translate(p.width / 2, p.height / 2);
          p.rotate(t * Math.PI * 2.5);
          p.noStroke();
          p.fill(0, 0, 100);
          p.beginShape();
          for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2;
            const r = 70 + Math.sin(t * Math.PI * 6) * 25;
            p.vertex(Math.cos(angle) * r, Math.sin(angle) * r);
          }
          p.endShape(p.CLOSE);
          p.pop();

          p.colorMode(p.RGB, 255);
          p.fill(255);
          p.textSize(16);
          p.textFont('monospace');
          p.text(`Frame: ${currentFrame + 1} / ${currentTotalFrames}`, 20, 28);
          p.text(`Time: ${(currentFrame / 30).toFixed(2)}s`, 20, 48);
        };
      };

      p5Instance = new window.p5(sketch);
    };

    const ensureP5 = (width, height) => {
      if (!p5Instance) {
        initP5(width, height);
        return;
      }
      if (p5Instance.width !== width || p5Instance.height !== height) {
        p5Instance.resizeCanvas(width, height);
      }
      renderWidth = width;
      renderHeight = height;
    };

    // Main app
    let encoder = null;
    let movData = null;
    let pngZipData = null;
    let pngFrames = [];
    let isRecording = false;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const downloadPngBtn = document.getElementById('downloadPngBtn');
    const uploadPngBtn = document.getElementById('uploadPngBtn');
    const pngFolderInput = document.getElementById('pngFolderInput');

    // Update preview canvas size based on resolution
    document.getElementById('resolution').addEventListener('change', (e) => {
      const [w, h] = e.target.value.split('x').map(Number);
      document.documentElement.style.setProperty('--preview-aspect', `${w} / ${h}`);
      ensureP5(w, h);
      currentFrame = 0;
      currentTotalFrames = 1;
      p5Instance.redraw();
    });


    startBtn.addEventListener('click', async () => {
      try {
        if (!createProResEncoder) {
          throw new Error(moduleLoadError ? moduleLoadError.message : 'Encoder module not loaded');
        }
        // Get settings
        const [width, height] = document.getElementById('resolution').value.split('x').map(Number);
        const [fpsNum, fpsDen] = document.getElementById('framerate').value.split('/').map(Number);
        const profile = parseInt(document.getElementById('profile').value);
        const totalFrames = parseInt(document.getElementById('frames').value);
        const range = document.getElementById('range').value;
        const capturePng = document.getElementById('pngSequence').checked;
        const useParallel = document.getElementById('parallel').checked;
        const workerCount = parseInt(document.getElementById('workerCount').value) || 4;
        document.documentElement.style.setProperty('--preview-aspect', `${width} / ${height}`);

        log('Initializing encoder...', 'info');
        setStatus('Initializing...', 'encoding');
        log(`Resolution: ${width}x${height}`, 'info');
        log(`Frame rate: ${fpsNum}/${fpsDen} fps`, 'info');
        log(`Profile: ${document.getElementById('profile').selectedOptions[0].text}`, 'info');
        log(`Frames: ${totalFrames}`, 'info');

        isRecording = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        downloadBtn.disabled = true;
        downloadPngBtn.disabled = true;
        movData = null;
        pngZipData = null;
        pngFrames = [];

        ensureP5(width, height);
        currentTotalFrames = totalFrames;

        // Initialize encoder (single-thread or parallel worker pool).
        // Both expose addFrameFromCanvas / finalize / destroy; the pool's are
        // async, so we await uniformly (awaiting a sync value is harmless).
        const encoderConfig = {
          width,
          height,
          frameRateNum: fpsNum,
          frameRateDen: fpsDen,
          profile: profile,
          range
        };
        if (useParallel) {
          if (!createProResEncoderPool) {
            throw new Error('Parallel encoding unavailable (module missing createProResEncoderPool)');
          }
          log(`Parallel mode: ${workerCount} workers`, 'info');
          encoder = await createProResEncoderPool({ ...encoderConfig, workers: workerCount });
          log(`Pool ready with ${encoder.workerCount} worker(s)`, 'info');
        } else {
          encoder = await createProResEncoder();
          encoder.initialize(encoderConfig);
        }

        // Encode frames
        log('Encoding frames...', 'info');
        setStatus('Encoding...', 'encoding');

        // Total render time = frame production + encoding, start to finalize.
        const renderStart = performance.now();

        for (let frame = 0; frame < totalFrames && isRecording; frame++) {
          currentFrame = frame;
          p5Instance.redraw();
          await encoder.addFrameFromCanvas(p5Instance.canvas);

          if (capturePng) {
            const blob = await canvasToPngBlob(p5Instance.canvas);
            const name = `frame_${String(frame + 1).padStart(4, '0')}.png`;
            pngFrames.push({ name, blob });
          }

          // Update progress
          const progress = ((frame + 1) / totalFrames) * 100;
          setProgress(progress);

          // Yield to UI
          if (frame % 5 === 0) {
            await new Promise(r => setTimeout(r, 0));
          }
        }

        if (!isRecording) {
          log('Encoding cancelled', 'error');
          setStatus('Cancelled', 'idle');
          startBtn.disabled = false;
          stopBtn.disabled = true;
          if (encoder) {
            await encoder.destroy();
            encoder = null;
          }
          return;
        }

        log('Finalizing MOV file...', 'info');
        movData = await encoder.finalize();
        const usedWorkers = useParallel ? encoder.workerCount : 0;
        await encoder.destroy();
        encoder = null;

        const renderMs = performance.now() - renderStart;
        const perFrame = renderMs / totalFrames;
        log(`Total render time: ${(renderMs / 1000).toFixed(2)} s ` +
            `(${perFrame.toFixed(1)} ms/frame, ${(1000 / perFrame).toFixed(1)} fps) · ` +
            `${useParallel ? `${usedWorkers} workers` : 'single-thread'}`,
            'success');

        if (capturePng && pngFrames.length) {
          log(`Building PNG zip (${pngFrames.length} frames)...`, 'info');
          const files = [];
          for (const frame of pngFrames) {
            const buffer = await frame.blob.arrayBuffer();
            files.push({ name: frame.name, data: new Uint8Array(buffer) });
          }
          pngZipData = buildZip(files);
          downloadPngBtn.disabled = false;
          log('PNG zip ready', 'success');
        }

        log(`Encoding complete! ${totalFrames} frames encoded`, 'success');

        setStatus('Ready to download', 'ready');
        setProgress(100);

        isRecording = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        downloadBtn.disabled = false;

      } catch (err) {
        const details = err && err.stack ? err.stack : (err && err.message ? err.message : String(err));
        log(`Error: ${details}`, 'error');
        setStatus('Error', 'idle');
        isRecording = false;
        if (encoder) {
          encoder.destroy();
          encoder = null;
        }
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });

    stopBtn.addEventListener('click', () => {
      isRecording = false;
      log('Stopping...', 'info');
    });

    downloadBtn.addEventListener('click', () => {
      if (!movData) return;

      const blob = new Blob([movData], { type: 'video/quicktime' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'output.mov';
      a.click();
      URL.revokeObjectURL(url);

      log('Download started: output.mov', 'success');
    });

    downloadPngBtn.addEventListener('click', () => {
      if (!pngZipData) return;

      const blob = new Blob([pngZipData], { type: 'application/zip' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'frames.zip';
      a.click();
      URL.revokeObjectURL(url);

      log('Download started: frames.zip', 'success');
    });

    // PNG folder upload handlers
    uploadPngBtn.addEventListener('click', () => {
      pngFolderInput.click();
    });

    pngFolderInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;

      // Filter for PNG files only and sort by name
      const pngFiles = files
        .filter(f => f.name.toLowerCase().endsWith('.png'))
        .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

      if (!pngFiles.length) {
        log('No PNG files found in folder', 'error');
        return;
      }

      log(`Found ${pngFiles.length} PNG files`, 'info');

      try {
        if (!createProResEncoder) {
          throw new Error(moduleLoadError ? moduleLoadError.message : 'Encoder module not loaded');
        }

        // Load first image to get dimensions
        const firstImg = await loadImageFromFile(pngFiles[0]);
        const width = firstImg.width;
        const height = firstImg.height;

        log(`Detected resolution: ${width}x${height}`, 'info');

        // Get settings
        const [fpsNum, fpsDen] = document.getElementById('framerate').value.split('/').map(Number);
        const profile = parseInt(document.getElementById('profile').value);
        const range = document.getElementById('range').value;

        log('Initializing encoder for PNG sequence...', 'info');
        setStatus('Initializing...', 'encoding');
        log(`Frame rate: ${fpsNum}/${fpsDen} fps`, 'info');
        log(`Profile: ${document.getElementById('profile').selectedOptions[0].text}`, 'info');
        log(`Range: ${range}`, 'info');

        isRecording = true;
        startBtn.disabled = true;
        uploadPngBtn.disabled = true;
        stopBtn.disabled = false;
        downloadBtn.disabled = true;
        downloadPngBtn.disabled = true;
        movData = null;

        // Create offscreen canvas for loading images
        const offscreenCanvas = document.createElement('canvas');
        offscreenCanvas.width = width;
        offscreenCanvas.height = height;
        const offscreenCtx = offscreenCanvas.getContext('2d');

        // Initialize encoder
        encoder = await createProResEncoder();
        encoder.initialize({
          width,
          height,
          frameRateNum: fpsNum,
          frameRateDen: fpsDen,
          profile: profile,
          range
        });

        log('Encoding PNG frames...', 'info');
        setStatus('Encoding...', 'encoding');

        for (let i = 0; i < pngFiles.length && isRecording; i++) {
          const file = pngFiles[i];
          const img = await loadImageFromFile(file);

          // Draw to canvas (clear first to avoid alpha compositing artifacts)
          offscreenCtx.clearRect(0, 0, width, height);
          offscreenCtx.drawImage(img, 0, 0);
          const imageData = offscreenCtx.getImageData(0, 0, width, height);

          // Encode frame
          encoder.addFrameRgba(imageData.data);

          // Update progress
          const progress = ((i + 1) / pngFiles.length) * 100;
          setProgress(progress);

          // Update preview (show current frame)
          ensureP5(width, height);
          const previewCtx = p5Instance.drawingContext;
          previewCtx.clearRect(0, 0, p5Instance.width, p5Instance.height);
          previewCtx.drawImage(img, 0, 0);

          if (i % 5 === 0) {
            log(`Encoded frame ${i + 1}/${pngFiles.length}: ${file.name}`, 'info');
            await new Promise(r => setTimeout(r, 0));
          }
        }

        if (!isRecording) {
          log('Encoding cancelled', 'error');
          setStatus('Cancelled', 'idle');
          startBtn.disabled = false;
          uploadPngBtn.disabled = false;
          stopBtn.disabled = true;
          if (encoder) {
            encoder.destroy();
            encoder = null;
          }
          return;
        }

        log('Finalizing MOV file...', 'info');
        movData = encoder.finalize();
        encoder.destroy();
        encoder = null;

        log(`Encoding complete! ${pngFiles.length} frames encoded from PNG sequence`, 'success');
        log(`Output size: ${(movData.length / 1024 / 1024).toFixed(2)} MB`, 'info');

        setStatus('Ready to download', 'ready');
        setProgress(100);

        isRecording = false;
        startBtn.disabled = false;
        uploadPngBtn.disabled = false;
        stopBtn.disabled = true;
        downloadBtn.disabled = false;

      } catch (err) {
        const details = err && err.stack ? err.stack : (err && err.message ? err.message : String(err));
        log(`Error: ${details}`, 'error');
        setStatus('Error', 'idle');
        isRecording = false;
        if (encoder) {
          encoder.destroy();
          encoder = null;
        }
        startBtn.disabled = false;
        uploadPngBtn.disabled = false;
        stopBtn.disabled = true;
      }

      // Reset file input so the same folder can be selected again
      pngFolderInput.value = '';
    });

    // Helper function to load image from file
    const loadImageFromFile = (file) => {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };
        img.onerror = (err) => {
          URL.revokeObjectURL(url);
          reject(err);
        };
        img.src = url;
      });
    };

    // Initial log
    log('ProRes WASM Encoder Demo loaded', 'info');
    log('Click "Record" to capture canvas, or "Upload PNG Folder" to encode a PNG sequence', 'info');
  </script>
</body>
</html>
